<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Payment Verifier — CBE &amp; telebirr</title>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: #f2f4f8; color: #1c2733; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; }
  h1 { font-size: 1.35rem; margin-bottom: 4px; }
  .sub { color: #64748b; font-size: .9rem; margin-bottom: 20px; text-align: center; }
  .card { background: #fff; border-radius: 14px; box-shadow: 0 2px 10px rgba(15,30,60,.08); padding: 20px; width: 100%; max-width: 460px; margin-bottom: 16px; }
  .drop { border: 2px dashed #b6c2d4; border-radius: 12px; padding: 28px 12px; text-align: center; cursor: pointer; transition: .15s; }
  .drop:hover, .drop.over { border-color: #2563eb; background: #eff4ff; }
  .drop p { color: #475569; font-size: .95rem; }
  .drop .big { font-size: 2rem; margin-bottom: 6px; }
  .btns { display: flex; gap: 10px; margin-top: 14px; }
  button { flex: 1; border: 0; border-radius: 10px; padding: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; }
  .primary { background: #2563eb; color: #fff; }
  .primary:disabled { background: #94a3b8; cursor: default; }
  .ghost { background: #eef2f7; color: #1c2733; }
  input[type=text] { width: 100%; margin-top: 12px; padding: 11px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: .95rem; }
  .note { font-size: .78rem; color: #94a3b8; margin-top: 6px; }
  #preview { max-width: 100%; max-height: 260px; border-radius: 10px; margin-top: 12px; display: none; }
  .progress { display: none; text-align: center; color: #2563eb; font-size: .9rem; margin-top: 12px; }
  .spinner { display: inline-block; vertical-align: middle; margin-right: 8px; width: 18px; height: 18px; border: 3px solid #dbe4f0; border-top-color: #2563eb; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #result { display: none; }
  .verdict { font-size: 1.25rem; font-weight: 800; padding: 14px; border-radius: 10px; text-align: center; margin-bottom: 6px; }
  .v-VERIFIED { background: #dcfce7; color: #166534; }
  .v-NEED_ACCOUNT { background: #fef9c3; color: #854d0e; }
  .v-FAILED { background: #fee2e2; color: #991b1b; }
  .conf { text-align: center; color: #475569; font-size: .88rem; margin-bottom: 14px; }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 9px 4px; border-bottom: 1px solid #eef2f7; font-size: .95rem; }
  td:first-child { color: #64748b; width: 42%; }
  td:last-child { font-weight: 600; text-align: right; word-break: break-all; }
  .amount-row td:last-child { color: #166534; font-size: 1.15rem; }
  .hint { background: #eff4ff; color: #1d4ed8; border-radius: 8px; padding: 10px; font-size: .88rem; margin-top: 10px; }
  details { margin-top: 12px; }
  summary { color: #94a3b8; font-size: .82rem; cursor: pointer; }
  details li { font-size: .8rem; color: #64748b; margin: 4px 0 0 18px; word-break: break-all; }
</style>
</head>
<body>
  <h1>💳 Payment Verifier</h1>
  <div class="sub">CBE &amp; telebirr — verified 100% from the QR code against the official bank servers</div>

  <div class="card">
    <div class="drop" id="drop">
      <div class="big">📷</div>
      <p><b>Tap to scan / upload a receipt</b><br>or drag &amp; drop the screenshot here</p>
    </div>
    <input type="file" id="file" accept="image/*" hidden>
    <input type="file" id="cam" accept="image/*" capture="environment" hidden>
    <div class="btns">
      <button class="ghost" id="btnCam">📸 Camera</button>
      <button class="ghost" id="btnFile">🖼️ Upload</button>
    </div>
    <input type="text" id="txid" placeholder="Optional: type the transaction ID (FT… or telebirr no.)" maxlength="20">
    <input type="text" id="account" placeholder="Optional: CBE account — last 8 digits" maxlength="16">
    <div class="note">CBE receipts need the account digits; you can even verify with no image if you type the transaction ID.</div>
    <img id="preview" alt="receipt preview">
    <div class="btns">
      <button class="primary" id="btnVerify" disabled>Verify payment</button>
    </div>
    <div class="progress" id="progress"><span class="spinner"></span><span id="progressText">Working…</span></div>
  </div>

  <div class="card" id="result">
    <div class="verdict" id="verdict"></div>
    <div class="conf" id="conf"></div>
    <table id="fields"></table>
    <div class="hint" id="hint" style="display:none"></div>
    <details><summary>What I did</summary><ul id="steps"></ul></details>
  </div>

<script>
  const drop = document.getElementById('drop');
  const fileInput = document.getElementById('file');
  const camInput = document.getElementById('cam');
  const preview = document.getElementById('preview');
  const btnVerify = document.getElementById('btnVerify');
  const progress = document.getElementById('progress');
  const progressText = document.getElementById('progressText');
  let currentFile = null;

  function setFile(f) {
    if (!f) return;
    currentFile = f;
    preview.src = URL.createObjectURL(f);
    preview.style.display = 'block';
    btnVerify.disabled = false;
    document.getElementById('result').style.display = 'none';
  }

  drop.onclick = () => fileInput.click();
  document.getElementById('btnFile').onclick = () => fileInput.click();
  document.getElementById('btnCam').onclick = () => camInput.click();
  fileInput.onchange = () => setFile(fileInput.files[0]);
  camInput.onchange = () => setFile(camInput.files[0]);
  drop.ondragover = (e) => { e.preventDefault(); drop.classList.add('over'); };
  drop.ondragleave = () => drop.classList.remove('over');
  drop.ondrop = (e) => { e.preventDefault(); drop.classList.remove('over'); setFile(e.dataTransfer.files[0]); };

  function loadBitmap(file) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => reject(new Error('could not load image'));
      img.src = URL.createObjectURL(file);
    });
  }

  function drawToCanvas(img, maxSide) {
    const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
    const c = document.createElement('canvas');
    c.width = Math.round(img.width * scale);
    c.height = Math.round(img.height * scale);
    c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
    return c;
  }

  // QR decode with enhancement passes — CBE puts a logo in the middle of its
  // QR codes, which usually needs the black/white threshold pass
  function decodeQrFromImage(img) {
    const passes = [
      (d) => d,
      (d) => gray(d, 1.4),
      (d) => threshold(gray(d, 1.4), 128),
      (d) => threshold(gray(d, 1.4), 160),
    ];
    for (const maxSide of [1400, 2200]) {
      const canvas = drawToCanvas(img, maxSide);
      const ctx = canvas.getContext('2d');
      const base = ctx.getImageData(0, 0, canvas.width, canvas.height);
      for (const pass of passes) {
        const d = pass(new ImageData(new Uint8ClampedArray(base.data), base.width, base.height));
        const code = jsQR(d.data, d.width, d.height);
        if (code && code.data) return code.data.trim();
      }
    }
    return null;
  }
  function gray(d, contrast) {
    const p = d.data;
    for (let i = 0; i < p.length; i += 4) {
      let v = 0.299 * p[i] + 0.587 * p[i + 1] + 0.114 * p[i + 2];
      v = (v - 128) * contrast + 128;
      v = Math.max(0, Math.min(255, v));
      p[i] = p[i + 1] = p[i + 2] = v;
    }
    return d;
  }
  function threshold(d, cut) {
    const p = d.data;
    for (let i = 0; i < p.length; i += 4) {
      const v = p[i] > cut ? 255 : 0;
      p[i] = p[i + 1] = p[i + 2] = v;
    }
    return d;
  }

  const LABELS = { amount: 'Amount (ETB)', totalDebited: 'Total debited (incl. fees)', date: 'Time sent', payer: 'From (payer)', receiver: 'To (receiver)', txId: 'Transaction ID', status: 'Status' };
  const VERDICT_TEXT = { VERIFIED: '✅ VERIFIED', NEED_ACCOUNT: '🔢 ACCOUNT DIGITS NEEDED', FAILED: '❌ NOT VERIFIED' };

  let ocrWorkerPromise = null;
  function getOcrWorker() {
    if (!ocrWorkerPromise) ocrWorkerPromise = Tesseract.createWorker('eng');
    return ocrWorkerPromise;
  }

  btnVerify.onclick = async () => {
    const manualId = document.getElementById('txid').value.trim();
    if (!currentFile && !manualId) return;
    btnVerify.disabled = true;
    progress.style.display = 'block';
    document.getElementById('result').style.display = 'none';
    try {
      let qr = null, ocrText = '';
      if (currentFile) {
        progressText.textContent = 'Reading QR code…';
        const img = await loadBitmap(currentFile);
        try { qr = decodeQrFromImage(img); } catch (e) {}

        // QR unreadable — read the transaction ID off the receipt instead
        // (the result still comes only from the bank server)
        if (!qr && !manualId) {
          progressText.textContent = 'No QR found — reading the transaction ID from the receipt…';
          try {
            const worker = await getOcrWorker();
            const { data } = await worker.recognize(drawToCanvas(img, 1600));
            ocrText = data.text || '';
          } catch (e) {}
        }
      }

      progressText.textContent = 'Checking with the official bank servers…';
      const res = await fetch('/api/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ qr, ocrText, txId: manualId, account: document.getElementById('account').value }),
      });
      showResult(await res.json());
    } catch (e) {
      showResult({ verdict: 'FAILED', confidence: 'Error: ' + e.message, fields: {}, steps: [] });
    } finally {
      progress.style.display = 'none';
      btnVerify.disabled = false;
    }
  };
  document.getElementById('txid').addEventListener('input', (e) => {
    if (e.target.value.trim() || currentFile) btnVerify.disabled = false;
  });

  function showResult(d) {
    const r = document.getElementById('result');
    const v = document.getElementById('verdict');
    v.textContent = VERDICT_TEXT[d.verdict] || d.verdict || 'ERROR';
    if (d.provider && d.verdict === 'VERIFIED') v.textContent += ' · ' + d.provider;
    v.className = 'verdict v-' + (d.verdict || 'FAILED');
    document.getElementById('conf').textContent = d.confidence || d.error || '';

    const tbl = document.getElementById('fields');
    tbl.innerHTML = '';
    for (const key of ['amount', 'totalDebited', 'date', 'payer', 'receiver', 'txId', 'status']) {
      const val = d.fields && d.fields[key];
      if (!val) continue;
      const tr = document.createElement('tr');
      if (key === 'amount') tr.className = 'amount-row';
      const td1 = document.createElement('td'); td1.textContent = LABELS[key];
      const td2 = document.createElement('td'); td2.textContent = val;
      tr.append(td1, td2);
      tbl.appendChild(tr);
    }

    const hint = document.getElementById('hint');
    hint.style.display = d.hint ? 'block' : 'none';
    if (d.hint) hint.textContent = d.hint;

    const steps = document.getElementById('steps');
    steps.innerHTML = '';
    (d.steps || []).forEach((s) => { const li = document.createElement('li'); li.textContent = s; steps.appendChild(li); });

    r.style.display = 'block';
    r.scrollIntoView({ behavior: 'smooth' });
  }
</script>
</body>
</html>
